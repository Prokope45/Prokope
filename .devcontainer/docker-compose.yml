services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # Mount the whole repo (parent of .devcontainer) into /workspace
      - ..:/workspace:cached
    command: sleep infinity
    environment:
      DJANGO_SETTINGS_MODULE: "prokope.settings"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - devnet

  db:
    image: postgres:16
    container_name: test_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: test_db
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d test_db"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - devnet

networks:
  devnet: